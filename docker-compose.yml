version: "3.9"

services:
  php:
    build: .
    container_name: cms_php
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql
    restart: always

mysql:
  image: mysql:8.0
  container_name: cms_mysql
  restart: always
  environment:
    MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    MYSQL_DATABASE: coffeeshop_db
  ports:
    - "3306:3306"
  volumes:
    - mysql_data:/var/lib/mysql

phpmyadmin:
  image: phpmyadmin/phpmyadmin
  container_name: cms_phpmyadmin
  restart: always
  ports:
    - "8080:80"
  environment:
    PMA_HOST: mysql
  depends_on:
    - mysql

volumes:
  mysql_data:
